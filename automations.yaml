  mode: single
- id: '1781639241228'
  alias: Meeting LED Sync
  description: Turns the Meeting LED (ESP-12F) on during scheduled work meetings.
  triggers:
  - event: start
    entity_id: calendar.andrew_mussey_s_smarterdx_calendar
    id: meeting-start
    trigger: calendar
  - event: end
    entity_id: calendar.andrew_mussey_s_smarterdx_calendar
    id: meeting-end
    trigger: calendar
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: meeting-start
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.esp_8dev2_meeting_status_led
    - conditions:
      - condition: trigger
        id: meeting-end
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.esp_8dev2_meeting_status_led
  mode: queued
